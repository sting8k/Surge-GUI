name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build macOS app
        run: |
          wails build -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}"

      - name: Create zip artifact
        run: |
          cd build/bin
          zip -r "Surge-${{ steps.version.outputs.VERSION }}-macOS.zip" Surge.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Surge ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            build/bin/Surge-${{ steps.version.outputs.VERSION }}-macOS.zip
